<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#2a1a3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </radialGradient>

    <filter id="textShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.8" />
    </filter>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- RPG風フレーム枠（外枠） -->
  <rect x="50" y="50" width="1100" height="530" fill="none" stroke="#3a3a6a" stroke-width="8"/>
  <rect x="58" y="58" width="1084" height="514" fill="none" stroke="#5a4a8a" stroke-width="2"/>

  <!-- 装飾用コーナー要素 -->
  <g stroke="#f1c40f" stroke-width="3" fill="none" opacity="0.6">
    <!-- 左上 -->
    <line x1="80" y1="80" x2="140" y2="80"/>
    <line x1="80" y1="80" x2="80" y2="140"/>
    <!-- 右上 -->
    <line x1="1120" y1="80" x2="1060" y2="80"/>
    <line x1="1120" y1="80" x2="1120" y2="140"/>
    <!-- 左下 -->
    <line x1="80" y1="550" x2="140" y2="550"/>
    <line x1="80" y1="550" x2="80" y2="490"/>
    <!-- 右下 -->
    <line x1="1120" y1="550" x2="1060" y2="550"/>
    <line x1="1120" y1="550" x2="1120" y2="490"/>
  </g>

  <!-- アイコン装飾エリア（上部） -->
  <g font-size="48" opacity="0.4" letter-spacing="20">
    <text x="150" y="140" fill="#f1c40f">📖</text>
    <text x="500" y="140" fill="#f1c40f">🎮</text>
    <text x="850" y="140" fill="#f1c40f">⚔️</text>
  </g>

  <!-- アイコン装飾エリア（下部） -->
  <g font-size="48" opacity="0.4" letter-spacing="20">
    <text x="150" y="580" fill="#f1c40f">🏫</text>
    <text x="500" y="580" fill="#f1c40f">🏆</text>
    <text x="850" y="580" fill="#f1c40f">✨</text>
  </g>

  <!-- メインタイトル背景（半透明ボックス） -->
  <rect x="300" y="210" width="600" height="150" fill="#000000" opacity="0.3" rx="10"/>

  <!-- メインタイトル: 「中受クエスト」 -->
  <text
    x="600"
    y="310"
    font-family="'Hiragino Sans', 'Yu Gothic Bold', sans-serif"
    font-size="110"
    font-weight="900"
    fill="#f1c40f"
    text-anchor="middle"
    filter="url(#textShadow)"
    letter-spacing="8">中受クエスト</text>

  <!-- サブタイトル: 「─ 我が子を合格に導け ─」 -->
  <text
    x="600"
    y="380"
    font-family="'Hiragino Sans', 'Yu Gothic', sans-serif"
    font-size="32"
    fill="#aaa"
    text-anchor="middle"
    letter-spacing="3">─ 我が子を合格に導け ─</text>

  <!-- 装飾用分割線 -->
  <line x1="300" y1="410" x2="900" y2="410" stroke="#3a3a6a" stroke-width="2" opacity="0.6"/>

  <!-- ゲーム風テキスト（下部） -->
  <g font-family="'Courier New', monospace" font-size="20" fill="#aaa" text-anchor="middle" opacity="0.7">
    <text x="600" y="460">◆ レトロRPG風学習ゲーム ◆</text>
    <text x="600" y="490">中学受験をゲーム化して楽しく勉強</text>
  </g>

  <!-- 右下テキスト装飾 -->
  <text
    x="1050"
    y="600"
    font-family="'Courier New', monospace"
    font-size="16"
    fill="#f1c40f"
    opacity="0.5"
    text-anchor="end">chuju.quest</text>
</svg>